<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNA 時間軸圖卡產生器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/tutorial-popup.css">
  <link rel="stylesheet" href="src/styles/timeline.css">
  <link rel="stylesheet" href="src/styles/headline.css">
  <link rel="stylesheet" href="src/styles/template3.css">
</head>
<body>
  <div id="toolbar" class="toolbar">
    <div class="tb-group">
      <span id="mission-title" class="toolbar-title"></span>
    </div>
    <div class="tb-group">
      <div class="tb-select">
        <select id="sheet-select" class="mission-select sheet-select" aria-label="切換試算表" hidden>
          <option value="">切換試算表</option>
        </select>
      </div>
      <div class="tb-select">
        <select id="mission-select" class="mission-select" aria-label="切換分頁" hidden>
          <option value="">切換分頁</option>
        </select>
      </div>
    </div>
    <div class="tb-group">
      <div class="tb-select">
        <select id="template-select" class="toolbar-select template-select" aria-label="切換版型">
          <option value="timeline">版型一：時間軸</option>
          <option value="headline">版型二：標題時間軸</option>
          <option value="template3">版型三：時間小標</option>
        </select>
      </div>
      <div class="mode-toggle">
        <button id="btn-mode-split" class="mode-btn">切分</button>
        <button id="btn-mode-single" class="mode-btn">不切分</button>
      </div>
    </div>
    <div class="tb-group tb-group--right">
      <button id="btn-refresh" class="btn-refresh" title="重新載入最新資料" aria-label="刷新">↻</button>
      <button id="btn-export" class="btn-export">匯出</button>
      <a id="btn-tutorial" href="#" class="toolbar-link">教學</a>
    </div>
  </div>
  <div id="app" class="app"></div>
  <script type="module" src="src/main.js"></script>
  <script type="module">import { initTutorialPopup } from './src/tutorial-popup.js'; initTutorialPopup();</script>
</body>
</html>
