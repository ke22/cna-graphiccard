<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNA 圖卡 Dashboard</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/dashboard.css">
  <link rel="stylesheet" href="src/styles/tutorial-popup.css">
</head>
<body>
  <header id="toolbar" class="toolbar dashboard-toolbar">
    <a class="dashboard-brand" href="dashboard.html" aria-label="CNA 圖卡工作台">
      <span class="dashboard-brand-slug">CNA</span>
      <span class="dashboard-brand-slash" aria-hidden="true"></span>
      <span class="dashboard-brand-name">圖卡工作台</span>
    </a>
    <div class="dashboard-nav-sep" aria-hidden="true"></div>
    <nav class="dashboard-primary-nav" aria-label="主要導覽">
      <a
        class="dashboard-nav-link is-current"
        href="dashboard.html"
        aria-current="page"
      >Dashboard</a>
      <a class="dashboard-nav-link" href="index.html">圖卡預覽</a>
      <a id="btn-tutorial" href="#" class="dashboard-nav-link">使用教學</a>
    </nav>
  </header>

  <main class="dashboard">
    <section class="dash-card">
      <h1 class="dash-heading">選擇圖卡</h1>
      <p class="dash-hint">貼上 Google 試算表網址，從分頁清單挑選一張圖卡開啟。</p>

      <label class="dash-label" for="sheet-select">選擇試算表</label>
      <div class="dash-row">
        <select id="sheet-select" class="dash-select">
          <option value="">自訂網址…</option>
        </select>
      </div>

      <label class="dash-label" for="sheet-url">試算表網址</label>
      <div class="dash-row">
        <input
          id="sheet-url"
          class="dash-input"
          type="url"
          placeholder="https://docs.google.com/spreadsheets/d/…"
          autocomplete="off"
          spellcheck="false"
        >
        <button id="btn-connect" class="dash-btn dash-btn-primary" type="button">連結試算表</button>
      </div>

      <label class="dash-label" for="tab-select">選擇分頁</label>
      <div class="dash-row">
        <select id="tab-select" class="dash-select" disabled>
          <option value="">尚未連結試算表</option>
        </select>
        <select id="template-select" class="dash-select dash-select-template" aria-label="選擇版型">
          <option value="timeline">版型一：時間軸</option>
          <option value="headline">版型二：標題時間軸</option>
          <option value="template3" selected>版型三：時間小標</option>
        </select>
        <button id="btn-open" class="dash-btn dash-btn-primary" type="button" disabled>開啟</button>
      </div>

      <div id="dash-status" class="dash-status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="src/dashboard.js"></script>
  <script type="module">import { initTutorialPopup } from './src/tutorial-popup.js'; initTutorialPopup();</script>
</body>
</html>
